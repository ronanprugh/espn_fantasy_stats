services:
  db:
    image: postgres:16
    container_name: espn_fantasy_stats_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: fantasy
    ports:
      - "5432:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fantasy -d fantasy"]
      interval: 5s
      timeout: 5s
      retries: 5
