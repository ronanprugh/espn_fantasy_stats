# fly.toml app configuration file generated for espn-fantasy-stats-api on 2026-05-13T23:52:15-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'espn-fantasy-stats-api'
primary_region = 'iad'

[build]

[deploy]
  release_command = 'alembic upgrade head'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
